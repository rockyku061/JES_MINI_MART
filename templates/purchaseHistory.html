<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase History - JES Student Mart</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
 

  <!-- Main Content -->
  <div class="main-container">
    <section class="left-panel">
      <div class="welcome-section">
        <h2>📜 Purchase History</h2>
        <p>Here are your past orders.</p>
      </div>

      <!-- Static Purchase History -->
      <section class="products">
        <h3>My Orders</h3>
        <div class="product-grid">
          <div class="product-card">
            <img src="https://via.placeholder.com/100" alt="Book">
            <p><strong>Engineering Book</strong></p>
            <p>Price: ₹500</p>
            <p>Date: 15/09/2025</p>
          </div>

          <div class="product-card">
            <img src="https://via.placeholder.com/100" alt="Calculator">
            <p><strong>Scientific Calculator</strong></p>
            <p>Price: ₹1200</p>
            <p>Date: 14/09/2025</p>
          </div>

          <div class="product-card">
            <img src="https://via.placeholder.com/100" alt="Pen Set">
            <p><strong>Pilot Pen Set</strong></p>
            <p>Price: ₹150</p>
            <p>Date: 12/09/2025</p>
          </div>
        </div>
      </section>
    </section>
  </div>


</body>
</html>
