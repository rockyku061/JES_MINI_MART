<!DOCTYPE html>
<html>

<head>

    <title>Chat | JES MINI MART</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='dashboard.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
        }

        .chat-container{
            width:60%;
            margin:auto;
            margin-top:30px;
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0px 4px 12px rgba(0,0,0,0.2);
        }

        .chat-header{
            background:#003b46;
            color:white;
            padding:20px;
            font-size:24px;
            font-weight:bold;
        }

        .chat-messages{
            height:500px;
            overflow-y:auto;
            background:#f1f1f1;
            padding:20px;
            display:flex;
            flex-direction:column;
        }

        .message{
            padding:12px 16px;
            margin-bottom:15px;
            border-radius:12px;
            max-width:70%;
            font-size:16px;
            font-family:Arial, sans-serif;
            word-wrap:break-word;
            line-height:1.5;
        }

        .message span{
            display:block;
            font-size:16px;
            color:inherit;
        }

        .mine{
            background:#0d6efd;
            color:white;
            align-self:flex-end;
            text-align:left;
        }

        .other{
            background:white;
            color:black;
            border:1px solid #ccc;
            align-self:flex-start;
        }

        .other strong{
            color:#003b46;
            font-size:14px;
        }

        .chat-input{
            padding:15px;
            background:white;
            border-top:1px solid #ddd;
        }

        .chat-input input{
            width:100%;
            padding:14px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-bottom:10px;
            font-size:16px;
            box-sizing:border-box;
        }

        .chat-input button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#003b46;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        .chat-input button:hover{
            background:#02515f;
        }

        @media screen and (max-width:768px){

            .chat-container{
                width:95%;
                margin-top:10px;
            }

            .chat-header{
                font-size:20px;
                padding:15px;
            }

            .message{
                max-width:85%;
                font-size:14px;
            }

        }

    </style>

</head>

<body class="student-page">

<div class="chat-container">

    <div class="chat-header">

        Chat with Seller - {{ product_name }}

    </div>

    <div class="chat-messages">

        {% for msg in messages %}

            {% if msg['sender'] == current_user %}

                <div class="message mine">

                    <span>

                        {{ msg['message'] }}

                    </span>

                </div>

            {% else %}

                <div class="message other">

                    <strong>

                        {{ msg['sender'] }}

                    </strong>

                    <br><br>

                    <span>

                        {{ msg['message'] }}

                    </span>

                </div>

            {% endif %}

        {% endfor %}

    </div>

    <form method="POST"
          class="chat-input">

        <input
            type="text"
            name="message"
            placeholder="Type your message..."
            required
        >

        <button type="submit">

            Send

        </button>

    </form>

</div>

</body>
</html>
