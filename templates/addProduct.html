<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>

<body class="student-page">

  <header class="navbar">

  <!-- Logo Section -->
  <div class="logo-section">
    <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">
    <h1>JES MINI MART</h1>
  </div>

  <!-- Navigation Links -->
  <nav class="nav-links">
    <a href="{{ url_for('student_dashboard') }}" class="navbar-btn">🏠 Home</a>
    <a href="{{ url_for('logout') }}" class="navbar-btn">🚪 Logout</a>
  </nav>

</header>

  <div class="main-container">
    <h2>Add Product</h2>

    <form method="POST" enctype="multipart/form-data">

      📦 Product Name:
      <input type="text" name="productName" placeholder="Enter product name" required>

      💲 Price:
      <input type="number" name="productPrice" placeholder="Enter price" required>

      📝 Description:
      <textarea name="productDescription" placeholder="Enter description" required></textarea>

      📷 Product Image:
      <input type="file" name="productImage" accept="image/*" required>

      <button type="submit">➕ Add Product</button>

    </form>
  </div>

</body>
</html>
