<!DOCTYPE html>
<html>
<head>
  <title>{{ role|capitalize }} Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
  
</head>
<body class="stafflogin-page">
  <div class="login-box">
    <h2>Staff Login</h2>
    <form method="POST" action="{{ url_for('login', role='staff') }}">
      <input type="text" name="username" placeholder="Username" required>
      <input type="text" name="regdno" placeholder="Regd no" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Continue</button>
    </form>

    <a href="/" class="back-link">← Back to Role Selection</a>
  </div>
</body>
</html>
